<div class="container py-4">
  <div class="d-flex align-items-center gap-3 mb-4">
    <button class="btn btn-outline-secondary btn-sm" (click)="volver()">← Volver</button>
    <h2 class="fw-bold text-primary mb-0">
      {{ id() ? 'Editar Factura' : 'Nueva Factura' }}
    </h2>
  </div>

  @if (error()) {
    <div class="alert alert-danger">{{ error() }}</div>
  }

  <div class="card shadow-sm">
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label fw-medium">Evento</label>
        <select
          class="form-select"
          [value]="form().eventoId"
          (change)="updateField('eventoId', +$any($event.target).value)"
        >
          <option value="0" disabled>Selecciona un evento</option>
          @for (evento of eventos(); track evento.id) {
            <option [value]="evento.id">{{ evento.nombre }}</option>
          }
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label fw-medium">Descripción</label>
        <textarea
          class="form-control"
          rows="3"
          [value]="form().descripcion"
          (input)="updateField('descripcion', $any($event.target).value)"
          placeholder="Descripción de la factura"
        >
        </textarea>
      </div>

      <div class="mb-3">
        <label class="form-label fw-medium">Total ($)</label>
        <input
          type="number"
          class="form-control"
          [value]="form().total"
          (input)="updateField('total', +$any($event.target).value)"
          placeholder="0.00"
          min="0"
          step="0.01"
        />
      </div>

      <div class="mb-4">
        <label class="form-label fw-medium">Fecha</label>
        <input
          type="date"
          class="form-control"
          [value]="form().fecha"
          (change)="updateField('fecha', $any($event.target).value)"
        />
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-primary" (click)="guardar()">
          {{ id() ? 'Actualizar' : 'Guardar' }}
        </button>
        <button class="btn btn-outline-secondary" (click)="volver()">Cancelar</button>
      </div>
    </div>
  </div>
</div>
