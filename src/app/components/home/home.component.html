<div class="container mt-5">
  <div class="card shadow mb-4">
    <div class="card-body text-center">
      <h2>Bienvenido, {{ nombre }}</h2>
      <p class="text-muted">Has iniciado sesión correctamente.</p>
      <button class="btn btn-danger" (click)="cerrarSesion()">Cerrar Sesión</button>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-md-6">
      <div class="card shadow-sm h-100 border-primary">
        <div class="card-body text-center py-5">
          <h4 class="text-primary fw-bold mb-2"> Eventos</h4>
          <p class="text-muted mb-4">Gestiona todos los eventos disponibles.</p>
          <a routerLink="/eventos" class="btn btn-primary px-4"> Ver Eventos </a>
        </div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card shadow-sm h-100 border-success">
        <div class="card-body text-center py-5">
          <h4 class="text-success fw-bold mb-2">Facturas</h4>
          <p class="text-muted mb-4">Consulta y exporta el reporte de facturas.</p>
          <a routerLink="/facturas" class="btn btn-success px-4"> Ver Facturas </a>
        </div>
      </div>
    </div>
  </div>
</div>
