<div class="container py-4">
  <div class="d-flex align-items-center gap-3 mb-4">
    <button class="btn btn-outline-secondary btn-sm" (click)="volver()">← Volver</button>
    <h2 class="fw-bold text-primary mb-0">
      {{ id() ? 'Editar Evento' : 'Nuevo Evento' }}
    </h2>
  </div>

  @if (error()) {
    <div class="alert alert-danger">{{ error() }}</div>
  }

  <div class="card shadow-sm">
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label fw-medium">Nombre</label>
        <input
          type="text"
          class="form-control"
          [value]="form().nombre"
          (input)="updateField('nombre', $any($event.target).value)"
          placeholder="Nombre del evento"
        />
      </div>

      <div class="mb-3">
        <label class="form-label fw-medium">Fecha</label>
        <input
          type="date"
          class="form-control"
          [value]="form().fecha"
          (change)="updateField('fecha', $any($event.target).value)"
        />
      </div>

      <div class="mb-3">
        <label class="form-label fw-medium">Lugar</label>
        <input
          type="text"
          class="form-control"
          [value]="form().lugar"
          (input)="updateField('lugar', $any($event.target).value)"
          placeholder="Lugar del evento"
        />
      </div>

      <div class="mb-3">
        <label class="form-label fw-medium">Descripción</label>
        <textarea
          class="form-control"
          rows="3"
          [value]="form().descripcion"
          (input)="updateField('descripcion', $any($event.target).value)"
          placeholder="Descripción del evento"
        >
        </textarea>
      </div>

      <div class="mb-4">
        <label class="form-label fw-medium">Precio ($)</label>
        <input
          type="number"
          class="form-control"
          [value]="form().precio"
          (input)="updateField('precio', +$any($event.target).value)"
          placeholder="0.00"
          min="0"
          step="0.01"
        />
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-primary" (click)="guardar()">
          {{ id() ? 'Actualizar' : 'Guardar' }}
        </button>
        <button class="btn btn-outline-secondary" (click)="volver()">Cancelar</button>
      </div>
    </div>
  </div>
</div>
